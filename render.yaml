services:
  - type: web
    name: parchar-app
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/storage/data
      - key: UPLOADS_DIR
        value: /opt/render/project/src/storage/uploads
    disk:
      name: parchar-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 10
