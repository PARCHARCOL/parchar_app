services:
  - type: web
    name: parchar-app
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_MODE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_DRIVER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
