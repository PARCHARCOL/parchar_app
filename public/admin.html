<!doctype html>
<html lang="es">
  <head>

    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>
      Admin | Parchar
    </title>

    <link
      rel="stylesheet"
      href="/styles.css"
    />

  </head>

  <body class="theme-body clients-body">

    <div class="ambient-glow"></div>

    <main class="app-shell">

      <header class="top-strip inner-top">

        <a
          class="icon-ghost icon-link"
          href="/"
          aria-label="Volver"
        >
          ←
        </a>

        <h1>
          Panel Admin
        </h1>

        <span class="icon-ghost">
          🛡️
        </span>

      </header>

      <section class="form-block glass-card">

        <h2>
          Administracion de negocios
        </h2>

        <p>
          Gestiona negocios pendientes,
          activos, pausados o rechazados.
        </p>

        <div class="admin-tabs">

          <button
            class="admin-tab active"
            data-status="pendiente"
          >
            Pendientes
          </button>

          <button
            class="admin-tab"
            data-status="activo"
          >
            Activos
          </button>

          <button
            class="admin-tab"
            data-status="pausado"
          >
            Pausados
          </button>

          <button
            class="admin-tab"
            data-status="rechazado"
          >
            Rechazados
          </button>

        </div>

        <div
          id="admin-business-list"
          class="admin-list"
        >

          <p class="loading">
            Cargando negocios...
          </p>

        </div>

      </section>

      <nav class="bottom-nav">

        <a
          class="nav-item"
          href="/"
        >
          <span>📍</span>
          <strong>Inicio</strong>
        </a>

        <a
          class="nav-item"
          href="/places.html?category=moto"
        >
          <span>🔥</span>
          <strong>Trending</strong>
        </a>

        <a
          class="nav-item"
          href="/clients.html"
        >
          <span>🎬</span>
          <strong>Publicar</strong>
        </a>

        <a
          class="nav-item active"
          href="/admin.html"
        >
          <span>🛡️</span>
          <strong>Admin</strong>
        </a>

      </nav>

    </main>

    <script src="/admin.js"></script>

  </body>
</html>
