<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3d146d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Parchar" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon-180.png" />
    <title>Parchar | Cargando</title>
    <style>
      :root {
        --bg-1: #140228;
        --bg-2: #2a0b4d;
        --line: #ff8a2f;
        --text: #f9edff;
        --soft: #d9bcf7;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 16px;
        background:
          radial-gradient(circle at 18% 12%, rgba(255, 149, 67, 0.2), transparent 36%),
          radial-gradient(circle at 85% 88%, rgba(196, 86, 255, 0.24), transparent 40%),
          linear-gradient(155deg, var(--bg-2), var(--bg-1) 54%, #080112 100%);
      }

      .splash {
        width: min(92vw, 480px);
        border-radius: 30px;
        padding: 28px 22px;
        text-align: center;
        border: 1px solid rgba(215, 156, 255, 0.3);
        background: rgba(24, 5, 50, 0.78);
        box-shadow: 0 26px 50px rgba(0, 0, 0, 0.45);
      }

      .logo-wrap {
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(255, 183, 104, 0.5);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.42);
      }

      .logo-wrap img {
        width: 100%;
        display: block;
        animation: glowPulse 2.4s ease-in-out infinite;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: clamp(1.7rem, 7vw, 2.35rem);
      }

      p {
        margin: 0;
      }

      .hint {
        color: var(--soft);
        margin-bottom: 18px;
      }

      .road {
        position: relative;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }

      .road::before {
        content: "";
        position: absolute;
        inset: 0;
        width: 35%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ffcc5c, #ff7f3a);
        animation: runRoad 1.1s linear infinite;
      }

      .status {
        margin-top: 12px;
        font-size: 0.92rem;
        color: #f2dcff;
      }

      .tiny {
        margin-top: 6px;
        font-size: 0.8rem;
        color: #b997df;
      }

      @keyframes runRoad {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @keyframes glowPulse {
        0% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.07);
        }
        100% {
          filter: brightness(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .logo-wrap img,
        .road::before {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <main class="splash">
      <div class="logo-wrap">
        <img src="/assets/parchar-logo.png" alt="Parchar" />
      </div>

      <h1>Parchar</h1>
      <p class="hint">Descubriendo planes y locales cerca de ti</p>

      <div class="road" aria-hidden="true"></div>

      <p class="status" id="status-text">Despertando servidor...</p>
      <p class="tiny" id="status-extra">Primera carga puede tardar unos segundos.</p>
    </main>

    <script>
      const statusText = document.querySelector("#status-text");
      const statusExtra = document.querySelector("#status-extra");
      let retries = 0;

      async function checkServer() {
        retries += 1;

        try {
          const response = await fetch("/api/health", {
            cache: "no-store",
          });

          if (response.ok) {
            statusText.textContent = "Todo listo. Entrando a la app...";
            statusExtra.textContent = "";

            setTimeout(() => {
              window.location.href = "/index.html";
            }, 700);
            return;
          }
        } catch (error) {
          // no-op
        }

        statusText.textContent = "Conectando con Parchar...";

        if (retries > 4) {
          statusExtra.textContent = "Si tarda mas de 1 minuto, recarga la pagina.";
        }

        setTimeout(checkServer, 2200);
      }

      checkServer();
    </script>
  </body>
</html>
